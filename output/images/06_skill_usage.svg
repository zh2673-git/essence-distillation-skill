<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300" width="800" height="300">
  <rect width="800" height="300" fill="#FAF7F2" rx="12"/>
  <style>
    .title { font-family: 'PingFang SC','Microsoft YaHei',sans-serif; font-size: 20px; font-weight: bold; fill: #3C2415; text-anchor: middle; }
    .step-title { font-family: 'PingFang SC','Microsoft YaHei',sans-serif; font-size: 14px; font-weight: bold; fill: #fff; text-anchor: middle; }
    .step-desc { font-family: 'PingFang SC','Microsoft YaHei',sans-serif; font-size: 11px; fill: rgba(255,255,255,0.9); text-anchor: middle; }
    .arrow { font-family: 'PingFang SC','Microsoft YaHei',sans-serif; font-size: 22px; fill: #C96442; text-anchor: middle; }
    .note { font-family: 'PingFang SC','Microsoft YaHei',sans-serif; font-size: 12px; fill: #8B5E3C; text-anchor: middle; }
  </style>
  <text x="400" y="35" class="title">Skill 使用流程</text>

  <rect x="30" y="65" width="160" height="80" rx="10" fill="#C96442"/>
  <text x="110" y="98" class="step-title">放入技能目录</text>
  <text x="110" y="118" class="step-desc">.claude/skills/</text>
  <text x="110" y="133" class="step-desc">.trae-cn/skills/</text>

  <text x="215" y="108" class="arrow">→</text>

  <rect x="240" y="65" width="160" height="80" rx="10" fill="#B5583A"/>
  <text x="320" y="98" class="step-title">触发词激活</text>
  <text x="320" y="118" class="step-desc">「用苏格拉底的视角」</text>
  <text x="320" y="133" class="step-desc">「苏格拉底会怎么看」</text>

  <text x="425" y="108" class="arrow">→</text>

  <rect x="450" y="65" width="160" height="80" rx="10" fill="#8B5E3C"/>
  <text x="530" y="98" class="step-title">路由匹配</text>
  <text x="530" y="118" class="step-desc">识别情境类型</text>
  <text x="530" y="133" class="step-desc">激活模型组合</text>

  <text x="635" y="108" class="arrow">→</text>

  <rect x="660" y="65" width="120" height="80" rx="10" fill="#3C2415"/>
  <text x="720" y="98" class="step-title">输出策略</text>
  <text x="720" y="118" class="step-desc">诘问式回应</text>
  <text x="720" y="133" class="step-desc">追问+审视</text>

  <rect x="30" y="180" width="740" height="90" rx="10" fill="none" stroke="#C96442" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="400" y="210" class="note">示例对话</text>
  <text x="400" y="235" style="font-family:'PingFang SC','Microsoft YaHei',sans-serif; font-size:12px; fill:#3C2415; text-anchor:middle;">用户：「苏格拉底，你怎么看社交媒体？」</text>
  <text x="400" y="258" style="font-family:'PingFang SC','Microsoft YaHei',sans-serif; font-size:12px; fill:#C96442; text-anchor:middle;">→ 路由5(面对现代问题) + 路由7(自我审视) → "这对灵魂有什么影响？"</text>
</svg>