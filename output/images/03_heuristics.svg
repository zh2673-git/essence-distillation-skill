<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <rect width="800" height="400" fill="#FAF7F2" rx="12"/>
  <style>
    .title { font-family: 'Microsoft YaHei','SimHei','Noto Sans SC',sans-serif; font-size: 22px; font-weight: bold; fill: #3C2415; text-anchor: middle; }
    .sub { font-family: 'Microsoft YaHei','SimHei','Noto Sans SC',sans-serif; font-size: 14px; fill: #666; text-anchor: middle; }
    .model { font-family: 'Microsoft YaHei','SimHei','Noto Sans SC',sans-serif; font-size: 16px; font-weight: bold; fill: #fff; text-anchor: middle; }
    .desc { font-family: 'Microsoft YaHei','SimHei','Noto Sans SC',sans-serif; font-size: 12px; fill: rgba(255,255,255,0.9); text-anchor: middle; }
    .question { font-family: 'Microsoft YaHei','SimHei','Noto Sans SC',sans-serif; font-size: 13px; fill: #3C2415; text-anchor: middle; font-weight: bold; }
    .arrow { font-family: 'Microsoft YaHei','SimHei','Noto Sans SC',sans-serif; font-size: 16px; fill: #C96442; text-anchor: middle; }
  </style>
  <text x="400" y="35" class="title">七条决策启发式</text>
  <text x="400" y="55" class="sub">每个启发式对应一个核心问题</text>
  
  <rect x="30" y="75" width="220" height="55" rx="8" fill="#C96442"/>
  <text x="140" y="100" class="model">1. 这是否自然？</text>
  <text x="140" y="118" class="desc">去掉人为干预后会怎样？</text>
  
  <rect x="290" y="75" width="220" height="55" rx="8" fill="#8B5E3C"/>
  <text x="400" y="100" class="model">2. 到了极点吗？</text>
  <text x="400" y="118" class="desc">当前状态是否走向反面？</text>
  
  <rect x="550" y="75" width="220" height="55" rx="8" fill="#3C2415"/>
  <text x="660" y="100" class="model">3. 哪里最柔弱？</text>
  <text x="660" y="118" class="desc">最柔弱处最有生命力</text>
  
  <rect x="30" y="150" width="220" height="55" rx="8" fill="#8B5E3C"/>
  <text x="140" y="175" class="model">4. 可以不干预吗？</text>
  <text x="140" y="193" class="desc">能不干预就不干预</text>
  
  <rect x="290" y="150" width="220" height="55" rx="8" fill="#3C2415"/>
  <text x="400" y="175" class="model">5. 该退了吗？</text>
  <text x="400" y="193" class="desc">功成之后考虑退出</text>
  
  <rect x="550" y="150" width="220" height="55" rx="8" fill="#C96442"/>
  <text x="660" y="175" class="model">6. 你知足了吗？</text>
  <text x="660" y="193" class="desc">知足不辱，知止不殆</text>
  
  <rect x="170" y="225" width="220" height="55" rx="8" fill="#8B5E3C"/>
  <text x="280" y="250" class="model">7. 你在争什么？</text>
  <text x="280" y="268" class="desc">不争而善胜</text>
  
  <text x="400" y="320" class="title" style="font-size:18px">决策流程</text>
  
  <rect x="60" y="340" width="680" height="45" rx="8" fill="none" stroke="#C96442" stroke-width="2"/>
  <text x="140" y="368" class="question">判断自然</text>
  <text x="220" y="368" class="arrow">→</text>
  <text x="290" y="368" class="question">识别极点</text>
  <text x="370" y="368" class="arrow">→</text>
  <text x="440" y="368" class="question">选择柔弱</text>
  <text x="520" y="368" class="arrow">→</text>
  <text x="590" y="368" class="question">最小干预</text>
  <text x="670" y="368" class="arrow">→</text>
  <text x="720" y="368" class="question" style="font-size:11px">退出</text>
</svg>