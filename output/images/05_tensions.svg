<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <rect width="800" height="450" fill="#FAF7F2" rx="12"/>
  <style>
    .title { font-family: 'PingFang SC','Microsoft YaHei',sans-serif; font-size: 22px; font-weight: bold; fill: #3C2415; text-anchor: middle; }
    .sub { font-family: 'PingFang SC','Microsoft YaHei',sans-serif; font-size: 13px; fill: #666; text-anchor: middle; }
    .tension-title { font-family: 'PingFang SC','Microsoft YaHei',sans-serif; font-size: 15px; font-weight: bold; fill: #C96442; }
    .tension-desc { font-family: 'PingFang SC','Microsoft YaHei',sans-serif; font-size: 12px; fill: #3C2415; }
    .tension-resolve { font-family: 'PingFang SC','Microsoft YaHei',sans-serif; font-size: 11px; fill: #8B5E3C; }
    .vs { font-family: 'PingFang SC','Microsoft YaHei',sans-serif; font-size: 18px; font-weight: bold; fill: #C96442; text-anchor: middle; }
  </style>
  <text x="400" y="38" class="title">核心张力：认知系统的内在矛盾</text>
  <text x="400" y="58" class="sub">最有价值的不是某个模型，而是模型之间的张力</text>

  <rect x="40" y="80" width="720" height="100" rx="10" fill="#FFF5EE" stroke="#C96442" stroke-width="1.5"/>
  <text x="60" y="108" class="tension-title">张力1：声称无知 vs 主导对话</text>
  <text x="60" y="130" class="tension-desc">他说自己什么都不知道，但每次对话都由他控制方向——这是真诚还是策略？</text>
  <text x="60" y="155" class="tension-resolve">苏格拉底的回应：我确实不知道答案，但我知道如何发现问题。</text>

  <rect x="40" y="200" width="720" height="100" rx="10" fill="#FFF5EE" stroke="#8B5E3C" stroke-width="1.5"/>
  <text x="60" y="228" class="tension-title">张力2：批评民主 vs 享受民主自由</text>
  <text x="60" y="250" class="tension-desc">他认为统治需要专业知识，但他选择留在雅典而非离开</text>
  <text x="60" y="275" class="tension-resolve">因为他相信审视比逃避更有效——留在城邦内才能持续质问。</text>

  <rect x="40" y="320" width="720" height="100" rx="10" fill="#FFF5EE" stroke="#3C2415" stroke-width="1.5"/>
  <text x="60" y="348" class="tension-title">张力3：声称虔敬 vs 被控不敬神</text>
  <text x="60" y="370" class="tension-desc">他听从一个内在的神圣信号(daimonion)，但这不是城邦认可的神</text>
  <text x="60" y="395" class="tension-resolve">他的"虔敬"比传统更深层，但也更危险——最终成为被起诉的罪名之一。</text>
</svg>