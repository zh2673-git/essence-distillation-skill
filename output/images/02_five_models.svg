<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <rect width="800" height="500" fill="#FAF7F2" rx="12"/>
  <style>
    .title { font-family: 'PingFang SC','Microsoft YaHei',sans-serif; font-size: 22px; font-weight: bold; fill: #3C2415; text-anchor: middle; }
    .sub { font-family: 'PingFang SC','Microsoft YaHei',sans-serif; font-size: 13px; fill: #666; text-anchor: middle; }
    .model-name { font-family: 'PingFang SC','Microsoft YaHei',sans-serif; font-size: 15px; font-weight: bold; fill: #fff; text-anchor: middle; }
    .model-desc { font-family: 'PingFang SC','Microsoft YaHei',sans-serif; font-size: 11px; fill: rgba(255,255,255,0.9); text-anchor: middle; }
    .arrow { font-family: 'PingFang SC','Microsoft YaHei',sans-serif; font-size: 16px; fill: #C96442; text-anchor: middle; }
    .conn { font-family: 'PingFang SC','Microsoft YaHei',sans-serif; font-size: 10px; fill: #8B5E3C; text-anchor: middle; }
  </style>
  <text x="400" y="38" class="title">苏格拉底的五个核心心智模型</text>
  <text x="400" y="58" class="sub">自知无知 → 诘问法 → 德性即知识 → 灵魂优先 → 宁受不义不行不义</text>

  <rect x="50" y="90" width="130" height="100" rx="10" fill="#C96442"/>
  <text x="115" y="130" class="model-name">自知无知</text>
  <text x="115" y="150" class="model-desc">起点</text>
  <text x="115" y="168" class="model-desc">清除虚假确定感</text>

  <rect x="210" y="90" width="130" height="100" rx="10" fill="#B5583A"/>
  <text x="275" y="130" class="model-name">诘问法</text>
  <text x="275" y="150" class="model-desc">方法</text>
  <text x="275" y="168" class="model-desc">揭示信念矛盾</text>

  <rect x="370" y="90" width="130" height="100" rx="10" fill="#9E4C32"/>
  <text x="435" y="130" class="model-name">德性即知识</text>
  <text x="435" y="150" class="model-desc">伦理</text>
  <text x="435" y="168" class="model-desc">恶=无知 善=知识</text>

  <rect x="530" y="90" width="130" height="100" rx="10" fill="#874029"/>
  <text x="595" y="130" class="model-name">灵魂优先</text>
  <text x="595" y="150" class="model-desc">价值</text>
  <text x="595" y="168" class="model-desc">灵魂>身体/财富</text>

  <rect x="690" y="90" width="80" height="100" rx="10" fill="#3C2415"/>
  <text x="730" y="125" class="model-name">宁受</text>
  <text x="730" y="145" class="model-name">不义</text>
  <text x="730" y="165" class="model-desc">底线</text>

  <text x="185" y="145" class="arrow">→</text>
  <text x="345" y="145" class="arrow">→</text>
  <text x="505" y="145" class="arrow">→</text>
  <text x="665" y="145" class="arrow">→</text>

  <rect x="50" y="230" width="720" height="240" rx="10" fill="none" stroke="#C96442" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="410" y="255" class="conn">核心循环</text>

  <text x="410" y="285" class="sub">承认无知 → 质问他人 → 发现他人更无知 → 确信"自知无知"是唯一的智慧 → 继续质问</text>

  <line x1="150" y1="310" x2="150" y2="440" stroke="#C96442" stroke-width="1.5"/>
  <line x1="300" y1="310" x2="300" y2="440" stroke="#C96442" stroke-width="1.5"/>
  <line x1="450" y1="310" x2="450" y2="440" stroke="#C96442" stroke-width="1.5"/>
  <line x1="600" y1="310" x2="600" y2="440" stroke="#C96442" stroke-width="1.5"/>

  <text x="225" y="335" class="conn">"你真的知道吗？"</text>
  <text x="375" y="335" class="conn">"你的信念矛盾吗？"</text>
  <text x="525" y="335" class="conn">"你知道什么是善吗？"</text>
  <text x="680" y="335" class="conn">"这对灵魂有何影响？"</text>

  <text x="225" y="370" class="conn">虚假确定感 → 被清除</text>
  <text x="375" y="370" class="conn">信念体系 → 被检验</text>
  <text x="525" y="370" class="conn">善恶标准 → 被追问</text>
  <text x="680" y="370" class="conn">价值排序 → 被审视</text>

  <text x="225" y="410" class="conn">德尔斐神谕验证</text>
  <text x="375" y="410" class="conn">与智者派交锋</text>
  <text x="525" y="410" class="conn">作恶者以为在求善</text>
  <text x="680" y="410" class="conn">用死亡验证</text>
</svg>