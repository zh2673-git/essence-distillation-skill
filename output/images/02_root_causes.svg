<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <rect width="800" height="450" fill="#FAF7F2" rx="12"/>
  <style>
    .title { font-family: 'Microsoft YaHei','SimHei','Noto Sans SC',sans-serif; font-size: 22px; font-weight: bold; fill: #3C2415; text-anchor: middle; }
    .sub { font-family: 'Microsoft YaHei','SimHei','Noto Sans SC',sans-serif; font-size: 14px; fill: #666; text-anchor: middle; }
    .box-title { font-family: 'Microsoft YaHei','SimHei','Noto Sans SC',sans-serif; font-size: 16px; font-weight: bold; fill: #fff; text-anchor: middle; }
    .box-desc { font-family: 'Microsoft YaHei','SimHei','Noto Sans SC',sans-serif; font-size: 12px; fill: rgba(255,255,255,0.9); text-anchor: middle; }
    .arrow { font-family: 'Microsoft YaHei','SimHei','Noto Sans SC',sans-serif; font-size: 18px; fill: #C96442; text-anchor: middle; }
    .label { font-family: 'Microsoft YaHei','SimHei','Noto Sans SC',sans-serif; font-size: 11px; fill: #8B5E3C; text-anchor: middle; }
    .quote { font-family: 'Microsoft YaHei','SimHei','Noto Sans SC',sans-serif; font-size: 13px; fill: #3C2415; text-anchor: middle; font-style: italic; }
  </style>
  <text x="400" y="35" class="title">根因追溯：老子为什么会这样想</text>
  <text x="400" y="55" class="sub">三条因果链交织，交汇于"道"</text>
  
  <rect x="30" y="75" width="230" height="340" rx="10" fill="none" stroke="#C96442" stroke-width="2"/>
  <text x="145" y="100" class="box-title" style="fill:#C96442">因果链1：巫史训练</text>
  
  <rect x="50" y="115" width="190" height="45" rx="6" fill="#C96442"/>
  <text x="145" y="135" class="box-title">世代史官</text>
  <text x="145" y="150" class="box-desc">核心能力是"观"</text>
  
  <text x="145" y="175" class="arrow">↓</text>
  
  <rect x="50" y="185" width="190" height="45" rx="6" fill="#8B5E3C"/>
  <text x="145" y="205" class="box-title">30年守藏室</text>
  <text x="145" y="220" class="box-desc">观察天象人事规律</text>
  
  <text x="145" y="245" class="arrow">↓</text>
  
  <rect x="50" y="255" width="190" height="45" rx="6" fill="#3C2415"/>
  <text x="145" y="275" class="box-title">道法自然</text>
  <text x="145" y="290" class="box-desc">自然运行优于人为</text>
  
  <text x="145" y="315" class="arrow">↓</text>
  
  <rect x="50" y="325" width="190" height="45" rx="6" fill="#3C2415"/>
  <text x="145" y="345" class="box-title">反者道之动</text>
  <text x="145" y="360" class="box-desc">王朝兴衰循环不息</text>
  
  <text x="145" y="395" class="quote">"人法地，地法天，</text>
  <text x="145" y="410" class="quote">天法道，道法自然"</text>
  
  <rect x="285" y="75" width="230" height="340" rx="10" fill="none" stroke="#8B5E3C" stroke-width="2"/>
  <text x="400" y="100" class="box-title" style="fill:#8B5E3C">因果链2：自然观察</text>
  
  <rect x="305" y="115" width="190" height="45" rx="6" fill="#C96442"/>
  <text x="400" y="135" class="box-title">幼年失怙</text>
  <text x="400" y="150" class="box-desc">沉默寡言 + 涡河观水</text>
  
  <text x="400" y="175" class="arrow">↓</text>
  
  <rect x="305" y="185" width="190" height="45" rx="6" fill="#8B5E3C"/>
  <text x="400" y="205" class="box-title">齿舌之教</text>
  <text x="400" y="220" class="box-desc">牙齿先朽舌头长存</text>
  
  <text x="400" y="245" class="arrow">↓</text>
  
  <rect x="305" y="255" width="190" height="45" rx="6" fill="#3C2415"/>
  <text x="400" y="275" class="box-title">柔弱胜刚强</text>
  <text x="400" y="290" class="box-desc">守柔处下是最优策略</text>
  
  <text x="400" y="315" class="arrow">↓</text>
  
  <rect x="305" y="325" width="190" height="45" rx="6" fill="#3C2415"/>
  <text x="400" y="345" class="box-title">上善若水</text>
  <text x="400" y="360" class="box-desc">不争而善胜</text>
  
  <text x="400" y="395" class="quote">"天下莫柔弱于水，</text>
  <text x="400" y="410" class="quote">而攻坚强者莫之能胜"</text>
  
  <rect x="540" y="75" width="230" height="340" rx="10" fill="none" stroke="#3C2415" stroke-width="2"/>
  <text x="655" y="100" class="box-title" style="fill:#3C2415">因果链3：历史教训</text>
  
  <rect x="560" y="115" width="190" height="45" rx="6" fill="#C96442"/>
  <text x="655" y="135" class="box-title">周室衰败</text>
  <text x="655" y="150" class="box-desc">法令越多盗贼越多</text>
  
  <text x="655" y="175" class="arrow">↓</text>
  
  <rect x="560" y="185" width="190" height="45" rx="6" fill="#8B5E3C"/>
  <text x="655" y="205" class="box-title">被免官不抗争</text>
  <text x="655" y="220" class="box-desc">反而获得新视角</text>
  
  <text x="655" y="245" class="arrow">↓</text>
  
  <rect x="560" y="255" width="190" height="45" rx="6" fill="#3C2415"/>
  <text x="655" y="275" class="box-title">无为而无不为</text>
  <text x="655" y="290" class="box-desc">不妄为则无不成</text>
  
  <text x="655" y="315" class="arrow">↓</text>
  
  <rect x="560" y="325" width="190" height="45" rx="6" fill="#3C2415"/>
  <text x="655" y="345" class="box-title">功成身退</text>
  <text x="655" y="360" class="box-desc">著书后莫知所终</text>
  
  <text x="655" y="395" class="quote">"功成而弗居，</text>
  <text x="655" y="410" class="quote">夫唯弗居，是以不去"</text>
</svg>