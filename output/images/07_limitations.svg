<svg xmlns="http://www.w3.org/2000/svg" width="900" height="380" viewBox="0 0 900 380">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="warn" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f39c12"/>
      <stop offset="100%" style="stop-color:#e67e22"/>
    </linearGradient>
  </defs>
  <rect width="900" height="380" fill="url(#bg2)" rx="12"/>
  <rect x="0" y="0" width="900" height="6" fill="url(#warn)" rx="3"/>
  <text x="450" y="48" text-anchor="middle" fill="#f39c12" font-size="24" font-weight="bold" font-family="Microsoft YaHei, SimHei, sans-serif">⚠ 诚实边界：老子.Skill 做不到什么</text>
  <line x1="250" y1="62" x2="650" y2="62" stroke="#f39c12" stroke-width="2" opacity="0.4"/>
  <rect x="40" y="85" width="250" height="110" rx="8" fill="#2c1810" stroke="#f39c12" stroke-width="1.2"/>
  <text x="165" y="115" text-anchor="middle" fill="#f39c12" font-size="15" font-weight="bold" font-family="Microsoft YaHei, SimHei, sans-serif">老子其人不可考</text>
  <text x="165" y="140" text-anchor="middle" fill="#a8b2d1" font-size="12" font-family="Microsoft YaHei, SimHei, sans-serif">《史记》记载简略</text>
  <text x="165" y="160" text-anchor="middle" fill="#a8b2d1" font-size="12" font-family="Microsoft YaHei, SimHei, sans-serif">"历史老子"与"传说老子"</text>
  <text x="165" y="180" text-anchor="middle" fill="#a8b2d1" font-size="12" font-family="Microsoft YaHei, SimHei, sans-serif">边界模糊</text>
  <rect x="325" y="85" width="250" height="110" rx="8" fill="#2c1810" stroke="#f39c12" stroke-width="1.2"/>
  <text x="450" y="115" text-anchor="middle" fill="#f39c12" font-size="15" font-weight="bold" font-family="Microsoft YaHei, SimHei, sans-serif">版本差异巨大</text>
  <text x="450" y="140" text-anchor="middle" fill="#a8b2d1" font-size="12" font-family="Microsoft YaHei, SimHei, sans-serif">郭店楚简 / 马王堆帛书 / 王弼本</text>
  <text x="450" y="160" text-anchor="middle" fill="#a8b2d1" font-size="12" font-family="Microsoft YaHei, SimHei, sans-serif">"大器晚成" vs "大器免成"</text>
  <text x="450" y="180" text-anchor="middle" fill="#e94560" font-size="12" font-family="Microsoft YaHei, SimHei, sans-serif">一字之差，颠覆解读</text>
  <rect x="610" y="85" width="250" height="110" rx="8" fill="#2c1810" stroke="#f39c12" stroke-width="1.2"/>
  <text x="735" y="115" text-anchor="middle" fill="#f39c12" font-size="15" font-weight="bold" font-family="Microsoft YaHei, SimHei, sans-serif">蒸馏不了神秘体验</text>
  <text x="735" y="140" text-anchor="middle" fill="#a8b2d1" font-size="12" font-family="Microsoft YaHei, SimHei, sans-serif">"道可道，非常道"</text>
  <text x="735" y="160" text-anchor="middle" fill="#a8b2d1" font-size="12" font-family="Microsoft YaHei, SimHei, sans-serif">框架能描述</text>
  <text x="735" y="180" text-anchor="middle" fill="#a8b2d1" font-size="12" font-family="Microsoft YaHei, SimHei, sans-serif">但无法复制体验</text>
  <rect x="40" y="220" width="410" height="110" rx="8" fill="#2c1810" stroke="#f39c12" stroke-width="1.2"/>
  <text x="245" y="250" text-anchor="middle" fill="#f39c12" font-size="15" font-weight="bold" font-family="Microsoft YaHei, SimHei, sans-serif">"自然"的边界模糊</text>
  <text x="245" y="275" text-anchor="middle" fill="#a8b2d1" font-size="12" font-family="Microsoft YaHei, SimHei, sans-serif">何为自然何为人为？人类文明本身是否"自然"？</text>
  <text x="245" y="300" text-anchor="middle" fill="#a8b2d1" font-size="12" font-family="Microsoft YaHei, SimHei, sans-serif">如果一切人为都反自然，老子著书是否也反自然？</text>
  <rect x="490" y="220" width="370" height="110" rx="8" fill="#2c1810" stroke="#f39c12" stroke-width="1.2"/>
  <text x="675" y="250" text-anchor="middle" fill="#f39c12" font-size="15" font-weight="bold" font-family="Microsoft YaHei, SimHei, sans-serif">柔弱胜刚强有条件</text>
  <text x="675" y="275" text-anchor="middle" fill="#a8b2d1" font-size="12" font-family="Microsoft YaHei, SimHei, sans-serif">需要时间、持续和对手到达极点</text>
  <text x="675" y="300" text-anchor="middle" fill="#e94560" font-size="12" font-family="Microsoft YaHei, SimHei, sans-serif">长期策略，不是短期忍让的借口</text>
  <text x="450" y="365" text-anchor="middle" fill="#f39c12" font-size="14" font-family="Microsoft YaHei, SimHei, sans-serif" opacity="0.7">一个不告诉你局限在哪的Skill，不值得信任</text>
</svg>