<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <rect width="800" height="500" fill="#FAF7F2" rx="12"/>
  <style>
    .title { font-family: 'Microsoft YaHei','SimHei','Noto Sans SC',sans-serif; font-size: 22px; font-weight: bold; fill: #3C2415; text-anchor: middle; }
    .sub { font-family: 'Microsoft YaHei','SimHei','Noto Sans SC',sans-serif; font-size: 14px; fill: #666; text-anchor: middle; }
    .model { font-family: 'Microsoft YaHei','SimHei','Noto Sans SC',sans-serif; font-size: 15px; font-weight: bold; fill: #fff; text-anchor: middle; }
    .desc { font-family: 'Microsoft YaHei','SimHei','Noto Sans SC',sans-serif; font-size: 11px; fill: rgba(255,255,255,0.9); text-anchor: middle; }
    .vs { font-family: 'Microsoft YaHei','SimHei','Noto Sans SC',sans-serif; font-size: 20px; font-weight: bold; fill: #C96442; text-anchor: middle; }
    .dim { font-family: 'Microsoft YaHei','SimHei','Noto Sans SC',sans-serif; font-size: 13px; fill: #3C2415; text-anchor: middle; font-weight: bold; }
    .detail { font-family: 'Microsoft YaHei','SimHei','Noto Sans SC',sans-serif; font-size: 11px; fill: #666; text-anchor: middle; }
  </style>
  <text x="400" y="35" class="title">苏格拉底 vs 老子：两种认知操作系统</text>
  <text x="400" y="55" class="sub">一个做加法，一个做减法</text>
  
  <rect x="30" y="70" width="340" height="40" rx="8" fill="#C96442"/>
  <text x="200" y="96" class="model" style="font-size:18px">苏格拉底 · 诘问求真系统</text>
  
  <rect x="430" y="70" width="340" height="40" rx="8" fill="#3C2415"/>
  <text x="600" y="96" class="model" style="font-size:18px">老子 · 顺应自然系统</text>
  
  <text x="400" y="96" class="vs">VS</text>
  
  <rect x="30" y="125" width="340" height="50" rx="6" fill="#FAF7F2" stroke="#C96442" stroke-width="1"/>
  <text x="200" y="147" class="dim">起点：我知道我一无所知</text>
  <text x="200" y="165" class="detail">承认无知 → 积极探索前提</text>
  
  <rect x="430" y="125" width="340" height="50" rx="6" fill="#FAF7F2" stroke="#3C2415" stroke-width="1"/>
  <text x="600" y="147" class="dim">起点：道可道，非常道</text>
  <text x="600" y="165" class="detail">否定定义 → 超越确定性</text>
  
  <rect x="30" y="190" width="340" height="50" rx="6" fill="#FAF7F2" stroke="#C96442" stroke-width="1"/>
  <text x="200" y="212" class="dim">方法：诘问法（破）</text>
  <text x="200" y="230" class="detail">揭示矛盾 → 清除虚假信念</text>
  
  <rect x="430" y="190" width="340" height="50" rx="6" fill="#FAF7F2" stroke="#3C2415" stroke-width="1"/>
  <text x="600" y="212" class="dim">方法：无为法（不立）</text>
  <text x="600" y="230" class="detail">减少干预 → 顺应自然趋势</text>
  
  <rect x="30" y="255" width="340" height="50" rx="6" fill="#FAF7F2" stroke="#C96442" stroke-width="1"/>
  <text x="200" y="277" class="dim">目标：追求定义和确定性</text>
  <text x="200" y="295" class="detail">普遍定义 → 确切知识</text>
  
  <rect x="430" y="255" width="340" height="50" rx="6" fill="#FAF7F2" stroke="#3C2415" stroke-width="1"/>
  <text x="600" y="277" class="dim">目标：超越定义和确定性</text>
  <text x="600" y="295" class="detail">不可言说 → 直觉体悟</text>
  
  <rect x="30" y="320" width="340" height="50" rx="6" fill="#FAF7F2" stroke="#C96442" stroke-width="1"/>
  <text x="200" y="342" class="dim">表达：对话体</text>
  <text x="200" y="360" class="detail">与人辩论 → 在对话中求真</text>
  
  <rect x="430" y="320" width="340" height="50" rx="6" fill="#FAF7F2" stroke="#3C2415" stroke-width="1"/>
  <text x="600" y="342" class="dim">表达：独白体</text>
  <text x="600" y="360" class="detail">自说自话 → 在独白中陈述</text>
  
  <rect x="30" y="385" width="340" height="50" rx="6" fill="#FAF7F2" stroke="#C96442" stroke-width="1"/>
  <text x="200" y="407" class="dim">对待矛盾：揭示矛盾</text>
  <text x="200" y="425" class="detail">矛盾 = 信念有误 → 清除</text>
  
  <rect x="430" y="385" width="340" height="50" rx="6" fill="#FAF7F2" stroke="#3C2415" stroke-width="1"/>
  <text x="600" y="407" class="dim">对待矛盾：包容矛盾</text>
  <text x="600" y="425" class="detail">矛盾 = 整体真理 → 接纳</text>
  
  <rect x="30" y="450" width="340" height="40" rx="6" fill="#C96442"/>
  <text x="200" y="476" class="model">为学日益 · 做加法</text>
  
  <rect x="430" y="450" width="340" height="40" rx="6" fill="#3C2415"/>
  <text x="600" y="476" class="model">为道日损 · 做减法</text>
</svg>