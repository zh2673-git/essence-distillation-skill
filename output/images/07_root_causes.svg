<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 340" width="800" height="340">
  <rect width="800" height="340" fill="#FAF7F2" rx="12"/>
  <style>
    .title { font-family: 'PingFang SC','Microsoft YaHei',sans-serif; font-size: 20px; font-weight: bold; fill: #3C2415; text-anchor: middle; }
    .header { font-family: 'PingFang SC','Microsoft YaHei',sans-serif; font-size: 13px; font-weight: bold; fill: #fff; text-anchor: middle; }
    .cell-name { font-family: 'PingFang SC','Microsoft YaHei',sans-serif; font-size: 12px; font-weight: bold; fill: #3C2415; text-anchor: middle; }
    .cell { font-family: 'PingFang SC','Microsoft YaHei',sans-serif; font-size: 11px; fill: #3C2415; text-anchor: middle; }
  </style>
  <text x="400" y="35" class="title">根因追溯：心智模型如何形成</text>

  <rect x="30" y="55" width="120" height="35" rx="6" fill="#3C2415"/>
  <text x="90" y="78" class="header">心智模型</text>

  <rect x="155" y="55" width="180" height="35" rx="6" fill="#3C2415"/>
  <text x="245" y="78" class="header">形成经历</text>

  <rect x="340" y="55" width="180" height="35" rx="6" fill="#3C2415"/>
  <text x="430" y="78" class="header">关键转折</text>

  <rect x="525" y="55" width="245" height="35" rx="6" fill="#3C2415"/>
  <text x="647" y="78" class="header">认知固化点</text>

  <rect x="30" y="95" width="120" height="40" rx="0" fill="#FFF5EE" stroke="#C96442" stroke-width="0.5"/>
  <text x="90" y="120" class="cell-name">自知无知</text>

  <rect x="155" y="95" width="180" height="40" rx="0" fill="#FFF5EE" stroke="#C96442" stroke-width="0.5"/>
  <text x="245" y="115" class="cell">自然哲学的失望</text>
  <text x="245" y="130" class="cell">阿那克萨戈拉无法回答</text>

  <rect x="340" y="95" width="180" height="40" rx="0" fill="#FFF5EE" stroke="#C96442" stroke-width="0.5"/>
  <text x="430" y="115" class="cell">德尔斐神谕验证</text>
  <text x="430" y="130" class="cell">政治家/诗人/工匠</text>

  <rect x="525" y="95" width="245" height="40" rx="0" fill="#FFF5EE" stroke="#C96442" stroke-width="0.5"/>
  <text x="647" y="115" class="cell">一生持续质问</text>
  <text x="647" y="130" class="cell">反复确认他人更无知</text>

  <rect x="30" y="140" width="120" height="40" rx="0" fill="#FFF5EE" stroke="#8B5E3C" stroke-width="0.5"/>
  <text x="90" y="165" class="cell-name">诘问法</text>

  <rect x="155" y="140" width="180" height="40" rx="0" fill="#FFF5EE" stroke="#8B5E3C" stroke-width="0.5"/>
  <text x="245" y="160" class="cell">与智者派交锋</text>
  <text x="245" y="175" class="cell">吸收对话技术</text>

  <rect x="340" y="140" width="180" height="40" rx="0" fill="#FFF5EE" stroke="#8B5E3C" stroke-width="0.5"/>
  <text x="430" y="160" class="cell">"说你所信"原则</text>
  <text x="430" y="175" class="cell">目标从说服转为求真</text>

  <rect x="525" y="140" width="245" height="40" rx="0" fill="#FFF5EE" stroke="#8B5E3C" stroke-width="0.5"/>
  <text x="647" y="160" class="cell">揭示矛盾比提供答案</text>
  <text x="647" y="175" class="cell">更能促进思考</text>

  <rect x="30" y="185" width="120" height="40" rx="0" fill="#FFF5EE" stroke="#C96442" stroke-width="0.5"/>
  <text x="90" y="210" class="cell-name">德性即知识</text>

  <rect x="155" y="185" width="180" height="40" rx="0" fill="#FFF5EE" stroke="#C96442" stroke-width="0.5"/>
  <text x="245" y="205" class="cell">关注"人应怎样活"</text>
  <text x="245" y="220" class="cell">从自然哲学转向</text>

  <rect x="340" y="185" width="180" height="40" rx="0" fill="#FFF5EE" stroke="#C96442" stroke-width="0.5"/>
  <text x="430" y="205" class="cell">作恶者以为在求善</text>
  <text x="430" y="220" class="cell">无人自愿追求恶</text>

  <rect x="525" y="185" width="245" height="40" rx="0" fill="#FFF5EE" stroke="#C96442" stroke-width="0.5"/>
  <text x="647" y="205" class="cell">多篇对话反复验证</text>
  <text x="647" y="220" class="cell">德性统一性确认</text>

  <rect x="30" y="230" width="120" height="40" rx="0" fill="#FFF5EE" stroke="#8B5E3C" stroke-width="0.5"/>
  <text x="90" y="255" class="cell-name">灵魂优先</text>

  <rect x="155" y="230" width="180" height="40" rx="0" fill="#FFF5EE" stroke="#8B5E3C" stroke-width="0.5"/>
  <text x="245" y="250" class="cell">从自然哲学转向</text>
  <text x="245" y="265" class="cell">关注灵魂而非世界</text>

  <rect x="340" y="230" width="180" height="40" rx="0" fill="#FFF5EE" stroke="#8B5E3C" stroke-width="0.5"/>
  <text x="430" y="250" class="cell">军旅中的身心体验</text>
  <text x="430" y="265" class="cell">灵魂控制身体</text>

  <rect x="525" y="230" width="245" height="40" rx="0" fill="#FFF5EE" stroke="#8B5E3C" stroke-width="0.5"/>
  <text x="647" y="250" class="cell">用死亡验证</text>
  <text x="647" y="265" class="cell">灵魂>身体>财富</text>

  <rect x="30" y="275" width="120" height="40" rx="0" fill="#FFF5EE" stroke="#3C2415" stroke-width="0.5"/>
  <text x="90" y="295" class="cell-name">宁受不义</text>
  <text x="90" y="310" class="cell-name">不行不义</text>

  <rect x="155" y="275" width="180" height="40" rx="0" fill="#FFF5EE" stroke="#3C2415" stroke-width="0.5"/>
  <text x="245" y="295" class="cell">目睹政治腐败</text>
  <text x="245" y="310" class="cell">民主/寡头皆不义</text>

  <rect x="340" y="275" width="180" height="40" rx="0" fill="#FFF5EE" stroke="#3C2415" stroke-width="0.5"/>
  <text x="430" y="295" class="cell">拒绝三十僭主命令</text>
  <text x="430" y="310" class="cell">冒死坚持正义</text>

  <rect x="525" y="275" width="245" height="40" rx="0" fill="#FFF5EE" stroke="#3C2415" stroke-width="0.5"/>
  <text x="647" y="295" class="cell">用死亡验证</text>
  <text x="647" y="310" class="cell">行不义伤害>受不义伤害</text>
</svg>