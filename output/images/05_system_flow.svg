<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <rect width="800" height="500" fill="#FAF7F2" rx="12"/>
  <style>
    .title { font-family: 'Microsoft YaHei','SimHei','Noto Sans SC',sans-serif; font-size: 22px; font-weight: bold; fill: #3C2415; text-anchor: middle; }
    .sub { font-family: 'Microsoft YaHei','SimHei','Noto Sans SC',sans-serif; font-size: 14px; fill: #666; text-anchor: middle; }
    .step { font-family: 'Microsoft YaHei','SimHei','Noto Sans SC',sans-serif; font-size: 15px; font-weight: bold; fill: #fff; text-anchor: middle; }
    .desc { font-family: 'Microsoft YaHei','SimHei','Noto Sans SC',sans-serif; font-size: 12px; fill: rgba(255,255,255,0.9); text-anchor: middle; }
    .arrow { font-family: 'Microsoft YaHei','SimHei','Noto Sans SC',sans-serif; font-size: 20px; fill: #C96442; text-anchor: middle; }
    .label { font-family: 'Microsoft YaHei','SimHei','Noto Sans SC',sans-serif; font-size: 11px; fill: #8B5E3C; text-anchor: middle; }
    .example { font-family: 'Microsoft YaHei','SimHei','Noto Sans SC',sans-serif; font-size: 12px; fill: #3C2415; text-anchor: start; }
    .ex-title { font-family: 'Microsoft YaHei','SimHei','Noto Sans SC',sans-serif; font-size: 13px; fill: #C96442; text-anchor: middle; font-weight: bold; }
  </style>
  <text x="400" y="35" class="title">老子Skill运行流程</text>
  <text x="400" y="55" class="sub">输入问题 → 场景路由 → 启发式筛选 → 心智模型 → 表达输出</text>
  
  <rect x="30" y="75" width="140" height="60" rx="8" fill="#C96442"/>
  <text x="100" y="100" class="step">场景识别</text>
  <text x="100" y="120" class="desc">7条路由</text>
  
  <text x="185" y="108" class="arrow">→</text>
  
  <rect x="200" y="75" width="140" height="60" rx="8" fill="#8B5E3C"/>
  <text x="270" y="100" class="step">启发式筛选</text>
  <text x="270" y="120" class="desc">7条核心问题</text>
  
  <text x="355" y="108" class="arrow">→</text>
  
  <rect x="370" y="75" width="140" height="60" rx="8" fill="#3C2415"/>
  <text x="440" y="100" class="step">心智模型</text>
  <text x="440" y="120" class="desc">5个核心模型</text>
  
  <text x="525" y="108" class="arrow">→</text>
  
  <rect x="540" y="75" width="220" height="60" rx="8" fill="#C96442"/>
  <text x="650" y="100" class="step">表达DNA输出</text>
  <text x="650" y="120" class="desc">正言若反 + 否定 + 比喻 + 留白</text>
  
  <text x="400" y="170" class="title" style="font-size:18px">场景路由示例</text>
  
  <rect x="30" y="190" width="230" height="130" rx="8" fill="none" stroke="#C96442" stroke-width="1.5"/>
  <text x="145" y="212" class="ex-title">面对职场竞争 → 路由1</text>
  <text x="45" y="232" class="example">❌ 变得强势，正面硬刚</text>
  <text x="45" y="252" class="example">✅ 不争，做别人不愿做的事</text>
  <text x="45" y="272" class="example">💡 上善若水，处众人之所恶</text>
  <text x="45" y="292" class="example">📌 夫唯不争，故天下莫能与之争</text>
  
  <rect x="285" y="190" width="230" height="130" rx="8" fill="none" stroke="#8B5E3C" stroke-width="1.5"/>
  <text x="400" y="212" class="ex-title">面对管理困境 → 路由2</text>
  <text x="300" y="232" class="example">❌ 加强管控，频繁干预</text>
  <text x="300" y="252" class="example">✅ 观察节奏，去掉阻碍</text>
  <text x="300" y="272" class="example">💡 治大国若烹小鲜</text>
  <text x="300" y="292" class="example">📌 为无为，则无不治</text>
  
  <rect x="540" y="190" width="230" height="130" rx="8" fill="none" stroke="#3C2415" stroke-width="1.5"/>
  <text x="655" y="212" class="ex-title">面对成功上升 → 路由3</text>
  <text x="555" y="232" class="example">❌ 继续加码，乘胜追击</text>
  <text x="555" y="252" class="example">✅ 考虑退出，功成身退</text>
  <text x="555" y="272" class="example">💡 金玉满堂，莫之能守</text>
  <text x="555" y="292" class="example">📌 知足不辱，知止不殆</text>
  
  <text x="400" y="360" class="title" style="font-size:18px">表达DNA特征</text>
  
  <rect x="30" y="380" width="150" height="50" rx="6" fill="#C96442"/>
  <text x="105" y="402" class="step" style="font-size:13px">正言若反</text>
  <text x="105" y="420" class="desc">大成若缺</text>
  
  <rect x="200" y="380" width="150" height="50" rx="6" fill="#8B5E3C"/>
  <text x="275" y="402" class="step" style="font-size:13px">否定定义</text>
  <text x="275" y="420" class="desc">道可道非常道</text>
  
  <rect x="370" y="380" width="150" height="50" rx="6" fill="#3C2415"/>
  <text x="445" y="402" class="step" style="font-size:13px">自然比喻</text>
  <text x="445" y="420" class="desc">上善若水</text>
  
  <rect x="540" y="380" width="150" height="50" rx="6" fill="#C96442"/>
  <text x="615" y="402" class="step" style="font-size:13px">顶真留白</text>
  <text x="615" y="420" class="desc">知者不言</text>
  
  <rect x="30" y="450" width="720" height="40" rx="8" fill="#3C2415"/>
  <text x="400" y="476" class="step" style="font-size:14px">反模式：不主动说服 · 不正面论证 · 不争辩 · 不居功 · 不贪多 · 不强求 · 不解释</text>
</svg>